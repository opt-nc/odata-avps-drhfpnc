name: Publish to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - 'zensical.config.json'
      - '.github/workflows/publish-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Zensical
        run: npm install -g zensical

      - name: Build site with Zensical
        run: |
          echo "Building site from Markdown files..."
          zensical build
          
          # Vérifier que le dossier docs a été créé
          if [ -d "docs" ]; then
            echo "✅ Site built successfully in docs/"
            ls -la docs/
          else
            echo "❌ Build failed - docs/ directory not found"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output deployment URL
        run: |
          echo "🚀 Site deployed successfully!"
          echo "📍 URL: https://opt-nc.github.io/odata-avps-drhfpnc/"
