[project]

site_name = "AVPS OPT-NC"
site_description = "Avis de Vacances de Poste de l'Office des Postes et Télécommunications de Nouvelle-Calédonie"
site_author = "OPT-NC"
site_url = "https://opt-nc.github.io/odata-avps-drhfpnc/"
repo_url = "https://github.com/opt-nc/odata-avps-drhfpnc"
repo_name = "opt-nc/odata-avps-drhfpnc"

copyright = """
Copyright &copy; 2026 OPT-NC<br>
<small>Dernière mise à jour : 11/04/2026 à 12:50 (Nouméa) | Commit : <a href="https://github.com/opt-nc/odata-avps-drhfpnc/commit/9163271" target="_blank">9163271</a></small>
"""

# Documentation source directory
docs_dir = "data"

# Build output directory
site_dir = "site"

# Dark mode by default with toggle
[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Basculer en mode clair"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Basculer en mode sombre"
